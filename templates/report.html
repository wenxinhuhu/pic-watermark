<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <a href="/" class="btn btn-sm btn-outline-secondary mb-3">返回</a>
      <div class="card">
        <div class="card-header">report.json</div>
        <div class="card-body">
          {% if not report_text %}
            <div class="placeholder">{{ out_dir }}/report.json 不存在或无法读取</div>
          {% else %}
            <pre class="report-json">{{ report_text | safe }}</pre>
          {% endif %}
        </div>
      </div>
    </div>
  </body>
</html>
